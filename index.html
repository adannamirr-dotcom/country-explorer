<!DOCTYPE html
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
     
     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin="">
    </script>
    
    <title>Country Explorer</title>

</head>
<body>
     <div id="loader">
            <p>Loading Map Data... Please wait</p>
            <div id="spinner"></div>
    </div>

    <div id="map"></div>


        <div class="search-bar">
            <input type="text" placeholder="Enter Your Country" id="input">
          
            <div class="suggestions"></div>

            <div class="details">
                <label for="flag">Flag: </label>
                <img src="" alt="Flag Image" id="flag">

                <label for="capital">Capital:</label>
                <input type="text" readonly id="capital">

                <label for="language">Language:</label>
                <input type="text" readonly id="language">

                <label for="currency">Currency:</label>
                <input type="text" readonly id="currency">

                <label for="area">Area: </label>
                <input type="text" readonly id="area">

                <label for="borders">Borders: </label>
                <div id="borders"></div>

                <label for="region">Region: </label>
                <input type="text"readonly id="region">
            </div>
        </div>

        <script src="script.js"></script>
   
</body>
</html>
